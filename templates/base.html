<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{% block title %}QR在庫管理 Web{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
  <script src="{{ url_for('static', path='/app.js') }}" defer></script>
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">Ver2.0 Web Phase 1</p>
      <h1>{% block page_title %}QR在庫管理{% endblock %}</h1>
    </div>
  </header>

  <nav class="bottom-nav" aria-label="主要メニュー">
    {% for nav in nav_items %}
      <a href="{{ nav.url }}" class="bottom-nav__link">{{ nav.label }}</a>
    {% endfor %}
  </nav>

  <main class="app-main">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
